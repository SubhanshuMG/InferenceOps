apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: virallens-inference-staging
  namespace: argocd
  labels:
    team: platform
    env: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: virallens
  source:
    repoURL: https://github.com/virallens/genai-infra.git
    targetRevision: main
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: virallens-staging
  syncPolicy:
    automated:                       # auto-sync for staging
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
