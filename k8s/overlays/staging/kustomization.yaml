apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: virallens-staging

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: virallens-inference
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: inference
                env:
                  - name: NODE_ENV
                    value: "staging"
                  - name: LOG_LEVEL
                    value: "info"
                resources:
                  requests:
                    cpu: "250m"
                    memory: "256Mi"
                  limits:
                    cpu: "1000m"
                    memory: "512Mi"

  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: virallens-inference
      spec:
        minReplicas: 2
        maxReplicas: 10

images:
  - name: gcr.io/virallens/inference-service
    newTag: staging-latest
