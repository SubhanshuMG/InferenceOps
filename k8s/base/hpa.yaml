apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: virallens-inference
  labels:
    app: virallens-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: virallens-inference
  minReplicas: 3
  maxReplicas: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100              # double capacity per scale-up
          periodSeconds: 60
        - type: Pods
          value: 5
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300   # 5-min cooldown before scaling down
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
    # Custom metric: active HTTP requests per pod (requires Prometheus adapter)
    - type: Pods
      pods:
        metric:
          name: active_requests
        target:
          type: AverageValue
          averageValue: "100"
